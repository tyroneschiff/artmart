<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1024 1024" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision">
  <!-- TRANSPARENT background — splash uses backgroundColor token from app.json
       so the cream is set there and this image is just the mark on top. -->

  <!-- Sun rays — slightly wobbly, hand-drawn feel via varying length/angle -->
  <g stroke="#E8A020" stroke-width="42" stroke-linecap="round" fill="none">
    <line x1="512" y1="200"  x2="512" y2="100"/>
    <line x1="700" y1="245"  x2="754" y2="160"/>
    <line x1="816" y1="408"  x2="908" y2="370"/>
    <line x1="816" y1="608"  x2="908" y2="650"/>
    <line x1="700" y1="780"  x2="754" y2="864"/>
    <line x1="512" y1="828"  x2="512" y2="922"/>
    <line x1="324" y1="780"  x2="270" y2="864"/>
    <line x1="208" y1="608"  x2="116" y2="650"/>
    <line x1="208" y1="408"  x2="116" y2="370"/>
    <line x1="324" y1="245"  x2="270" y2="160"/>
  </g>

  <!-- Sun body — slightly wobbly circle drawn as a path for hand-feel -->
  <path d="M 512 268
           C 648 264, 760 372, 760 510
           C 762 650, 656 762, 514 760
           C 374 758, 264 650, 268 510
           C 270 374, 376 270, 512 268
           Z"
        fill="#E8A020"/>

  <!-- Inner warm highlight -->
  <ellipse cx="468" cy="464" rx="120" ry="92" fill="#FFE8A6" opacity="0.85"/>

  <!-- Eyes -->
  <circle cx="446" cy="490" r="22" fill="#1C1810"/>
  <circle cx="578" cy="490" r="22" fill="#1C1810"/>

  <!-- Smile — wobbly child-drawn curve -->
  <path d="M 432 568
           Q 512 624, 592 568"
        stroke="#1C1810"
        stroke-width="22"
        stroke-linecap="round"
        fill="none"/>
</svg>
