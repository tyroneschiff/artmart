<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision">
  <!-- Cream backdrop -->
  <rect width="1200" height="630" fill="#FEFAF3"/>

  <!-- Subtle warm tint band on the right where the icon lives -->
  <rect x="700" y="0" width="500" height="630" fill="#F5EDD8"/>

  <!-- Right pane (700–1200, center x=950): the sun icon, scaled to ~400px -->
  <g transform="translate(950, 315) scale(0.4) translate(-512, -512)">
    <!-- Rays -->
    <g stroke="#E8A020" stroke-width="42" stroke-linecap="round" fill="none">
      <line x1="512" y1="200"  x2="512" y2="100"/>
      <line x1="700" y1="245"  x2="754" y2="160"/>
      <line x1="816" y1="408"  x2="908" y2="370"/>
      <line x1="816" y1="608"  x2="908" y2="650"/>
      <line x1="700" y1="780"  x2="754" y2="864"/>
      <line x1="512" y1="828"  x2="512" y2="922"/>
      <line x1="324" y1="780"  x2="270" y2="864"/>
      <line x1="208" y1="608"  x2="116" y2="650"/>
      <line x1="208" y1="408"  x2="116" y2="370"/>
      <line x1="324" y1="245"  x2="270" y2="160"/>
    </g>
    <!-- Sun body -->
    <path d="M 512 268
             C 648 264, 760 372, 760 510
             C 762 650, 656 762, 514 760
             C 374 758, 264 650, 268 510
             C 270 374, 376 270, 512 268
             Z"
          fill="#E8A020"/>
    <!-- Highlight -->
    <ellipse cx="468" cy="464" rx="120" ry="92" fill="#FFE8A6" opacity="0.85"/>
    <!-- Eyes -->
    <circle cx="446" cy="490" r="22" fill="#1C1810"/>
    <circle cx="578" cy="490" r="22" fill="#1C1810"/>
    <!-- Smile -->
    <path d="M 432 568 Q 512 624, 592 568" stroke="#1C1810" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark on the left -->
  <text x="80" y="160" font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="44" font-weight="900" fill="#1C1810" letter-spacing="-1.5">
    draw <tspan fill="#E8A020">up</tspan>
  </text>

  <!-- Headline -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="62" font-weight="900" fill="#1C1810" letter-spacing="-2">
    Step inside your
  </text>
  <text x="80" y="362" font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="62" font-weight="900" fill="#1C1810" letter-spacing="-2">
    <tspan>child's </tspan><tspan fill="#E8A020">drawing.</tspan>
  </text>

  <!-- Supporting copy -->
  <text x="80" y="430" font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="24" font-weight="500" fill="#6B5E4E" letter-spacing="-0.4">
    AI brings it to life. A warm voice
  </text>
  <text x="80" y="464" font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="24" font-weight="500" fill="#6B5E4E" letter-spacing="-0.4">
    reads it back to them by name.
  </text>

  <!-- CTA pill -->
  <rect x="80" y="488" width="296" height="64" rx="32" fill="#1C1810"/>
  <text x="228" y="529" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Inter, Segoe UI, sans-serif"
        font-size="20" font-weight="700" fill="#FEFAF3" letter-spacing="-0.2">
    Try the iPhone beta →
  </text>
</svg>
